<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Jackpot Dashboard</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding-top:40px;
}

/* provider buttons */

.provider-buttons{
  display:flex;
  gap:15px;
}

.provider-buttons button{
  padding:10px 25px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:white;
}

.provider-buttons button.active{
  background:#00aa55;
}

/* provider groups */

.provider-group{
  display:none;
  flex-direction:column;
  gap:40px;
}

.provider-group.active{
  display:flex;
}

/* game layout */

.meter-container{
  width:400px;
  text-align:center;
}

.game-title{
  margin-bottom:10px;
  font-size:22px;
}

.progress-bar-wrap{
  width:100%;
  height:30px;
  background:#333;
  border-radius:8px;
  position:relative;
  overflow:hidden;
  margin-bottom:10px;
}

.progress-bar{
  height:100%;
  border-radius:8px;
  transition:width 1.5s linear, background 0.5s linear;
}

.progress-value{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:white;
  font-weight:bold;
}

.game-meter{
  font-size:18px;
}

</style>
</head>

<body>

<div class="provider-buttons">
<button id="btn_jili" onclick="showProvider('jili')">JILI</button>
<button id="btn_pg" onclick="showProvider('pg')">PG</button>
</div>

<div id="provider_jili" class="provider-group"></div>
<div id="provider_pg" class="provider-group"></div>

<script>

/* PROVIDERS */

const providers={
jili:[
"Boxing King",
"Golden Empire"
],
pg:[
"Wild Bounty Showdown",
"Wild Bandito"
]
};


/* SHOW PROVIDER TAB */

function showProvider(name){

document.querySelectorAll(".provider-group")
.forEach(g=>g.classList.remove("active"));

document.getElementById("provider_"+name).classList.add("active");

document.querySelectorAll(".provider-buttons button")
.forEach(b=>b.classList.remove("active"));

document.getElementById("btn_"+name).classList.add("active");

}


/* CREATE GAME UI */

function createGame(title,id,provider){

const container=document.createElement("div");
container.className="meter-container";

container.innerHTML=`

<div class="game-title">${title}</div>

<div class="progress-bar-wrap">
<div class="progress-bar" id="bar_${id}"></div>
<div class="progress-value" id="text_${id}">--</div>
</div>

<div class="game-meter" id="label_${id}">Loading...</div>

`;

document.getElementById("provider_"+provider).appendChild(container);

}


/* CREATE ALL GAMES */

providers.jili.forEach((game,i)=>{
createGame(game,"jili"+i,"jili");
});

providers.pg.forEach((game,i)=>{
createGame(game,"pg"+i,"pg");
});


/* UPDATE BAR */

function updateBar(id,value){

const bar=document.getElementById("bar_"+id);
const text=document.getElementById("text_"+id);
const label=document.getElementById("label_"+id);

if(!bar) return;

bar.style.width=value+"%";

text.textContent=value+"%";

label.textContent="Jackpot Meter: "+value+"%";

if(value>=90){
bar.style.background="red";
}else{
bar.style.background="green";
}

}


/* FETCH SERVER METERS */

async function updateMeters(){

try{

const res = await fetch("/.netlify/functions/meters");
const data = await res.json();

updateBar("jili0", data.boxingKing);
updateBar("jili1", data.goldenEmpire);

}catch(e){
console.log("API error",e);
}

}


/* START LOOP */

setInterval(updateMeters,3000);
updateMeters();


/* DEFAULT TAB */

showProvider("jili");

</script>

</body>
</html>
