<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Jackpot Dashboard</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding-top:40px;
}

.provider-buttons{
  display:flex;
  gap:15px;
}

.provider-buttons button{
  padding:10px 25px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:white;
}

.provider-buttons button.active{
  background:#00aa55;
}

.provider-group{
  display:none;
  flex-direction:column;
  gap:40px;
}

.provider-group.active{
  display:flex;
}

.meter-container{
  width:400px;
  text-align:center;
}

.game-title{
  margin-bottom:10px;
  font-size:22px;
}

.progress-bar-wrap{
  width:100%;
  height:30px;
  background:#333;
  border-radius:8px;
  position:relative;
  overflow:hidden;
  margin-bottom:10px;
}

.progress-bar{
  height:100%;
  border-radius:8px;
  transition:width 1.5s linear, background 0.5s linear;
}

.progress-value{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:white;
  font-weight:bold;
}

.game-meter{
  font-size:18px;
  margin-bottom:10px;
}

.timeframes{
  font-size:16px;
  text-align:left;
  width:160px;
  margin:auto;
}

.timeframes div{
  display:flex;
  justify-content:space-between;
  margin:3px 0;
}

.green{
  color:#00ff00;
}

.red{
  color:#ff4040;
}
</style>
</head>

<body>

<div class="provider-buttons">
<button id="btn_jili" onclick="showProvider('jili')">JILI</button>
<button id="btn_pg" onclick="showProvider('pg')">PG</button>
</div>

<div id="provider_jili" class="provider-group"></div>
<div id="provider_pg" class="provider-group"></div>

<script>
const providers={
  jili:["Boxing King","Golden Empire"],
  pg:["Wild Bounty Showdown","Wild Bandito"]
};

/* Show provider tab */
function showProvider(name){
  document.querySelectorAll(".provider-group").forEach(g=>g.classList.remove("active"));
  document.getElementById("provider_"+name).classList.add("active");
  document.querySelectorAll(".provider-buttons button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn_"+name).classList.add("active");
}

/* Create game container */
function createGame(title,id,provider){
  const container=document.createElement("div");
  container.className="meter-container";
  container.innerHTML=`
    <div class="game-title">${title}</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="bar_${id}"></div>
      <div class="progress-value" id="text_${id}"></div>
    </div>
    <div class="game-meter" id="label_${id}"></div>
    <div class="timeframes">
      <div><span>10min:</span> <span id="tf10_${id}"></span></div>
      <div><span>1 Hr:</span> <span id="tf1h_${id}"></span></div>
      <div><span>3 Hrs:</span> <span id="tf3h_${id}"></span></div>
      <div><span>6 Hrs:</span> <span id="tf6h_${id}"></span></div>
    </div>
  `;
  document.getElementById("provider_"+provider).appendChild(container);
  createTimeframes(id);
}

/* Create timeframe logic */
function createTimeframe(id,max,minStep,maxStep){
  let value=Math.random()*max;
  let increasing=Math.random()<0.5;
  const el=document.getElementById(id);

  function update(){
    let step=Math.random()*(maxStep-minStep)+minStep;
    if(increasing){
      value+=step;
      if(value>=max){ value=max; increasing=false; }
      el.textContent=value.toFixed(2)+"%";
      el.className="green";
    }else{
      value-=step;
      if(value<=0){ value=0; increasing=true; }
      el.textContent="-"+value.toFixed(2)+"%";
      el.className="red";
    }
    setTimeout(update,300);
  }
  update();
}

function createTimeframes(id){
  createTimeframe("tf10_"+id,5,0.01,0.09);
  createTimeframe("tf1h_"+id,30,0.04,0.34);
  createTimeframe("tf3h_"+id,68,0.06,0.36);
  createTimeframe("tf6h_"+id,77,0.11,1.21);
}

/* Initialize games */
providers.jili.forEach((game,i)=>createGame(game,"jili"+i,"jili"));
providers.pg.forEach((game,i)=>createGame(game,"pg"+i,"pg"));

/* Default tab */
showProvider("jili");

/* Update meters from server function */
async function updateMeterFromServer(id, gameName){
  try{
    const res=await fetch("/.netlify/functions/meters");
    const data=await res.json();
    const bar=document.getElementById("bar_"+id);
    const text=document.getElementById("text_"+id);
    const label=document.getElementById("label_"+id);
    let value=parseFloat(data[gameName]);
    // slight random fluctuation to make it dynamic
    let step=(Math.random()*0.75+0.05)*(Math.random()<0.5?1:-1);
    value=Math.min(90, Math.max(10, value+step));
    bar.style.width=value+"%";
    bar.style.background=value>=90?"red":value<=10?"green":"lime";
    text.textContent=value.toFixed(2)+"%";
    label.textContent="Jackpot Meter: "+value.toFixed(2)+"%";
  }catch(e){
    console.log("Error fetching meters",e);
  }
}

/* Polling loop */
setInterval(()=>{
  updateMeterFromServer("jili0","boxingKing");
  updateMeterFromServer("jili1","goldenEmpire");
},2500);
updateMeterFromServer("jili0","boxingKing");
updateMeterFromServer("jili1","goldenEmpire");
</script>

</body>
</html>
