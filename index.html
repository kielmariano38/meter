<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Jackpot Dashboard</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding-top:40px;
}

/* provider buttons */
.provider-buttons{
  display:flex;
  gap:15px;
}

.provider-buttons button{
  padding:10px 25px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:white;
}

.provider-buttons button.active{
  background:#00aa55;
}

/* provider groups */
.provider-group{
  display:none;
  flex-direction:column;
  gap:40px;
}

.provider-group.active{
  display:flex;
}

/* meter layout */
.meter-container{
  width:600px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.meter-left{
  width:400px;
}

.game-title{
  margin-bottom:10px;
  font-size:22px;
}

.progress-bar-wrap{
  width:100%;
  height:30px;
  background:#333;
  border-radius:8px;
  position:relative;
  overflow:hidden;
  margin-bottom:10px;
}

.progress-bar{
  height:100%;
  border-radius:8px;
  transition:width 3s linear, background 3s linear;
}

.progress-value{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:white;
  font-weight:bold;
}

.game-meter{
  font-size:18px;
  margin-bottom:5px;
}

.timeframes{
  display:flex;
  flex-direction:column;
  font-size:16px;
  gap:3px;
}

.timeframes div{
  display:flex;
  justify-content:space-between;
}

.green{ color:#00ff00; }
.red{ color:#ff4040; }
</style>
</head>

<body>

<div class="provider-buttons">
<button id="btn_jili" onclick="showProvider('jili')">JILI</button>
<button id="btn_pg" onclick="showProvider('pg')">PG</button>
</div>

<div id="provider_jili" class="provider-group"></div>
<div id="provider_pg" class="provider-group"></div>

<script>
/* PROVIDER DATA */
const providers={
  jili:["Boxing King","Golden Empire"],
  pg:["Wild Bounty Showdown","Wild Bandito"]
};

/* SHOW PROVIDER TAB */
function showProvider(name){
  document.querySelectorAll(".provider-group").forEach(g=>g.classList.remove("active"));
  document.getElementById("provider_"+name).classList.add("active");
  document.querySelectorAll(".provider-buttons button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn_"+name).classList.add("active");
}

/* CREATE GAME UI */
function createGame(title,id,provider){
  const container=document.createElement("div");
  container.className="meter-container";
  container.innerHTML=`
    <div class="meter-left">
      <div class="game-title">${title}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="bar_${id}"></div>
        <div class="progress-value" id="text_${id}"></div>
      </div>
      <div class="game-meter" id="label_${id}"></div>
    </div>
    <div class="timeframes">
      <div><span>10min:</span> <span id="tf10_${id}"></span></div>
      <div><span>1 Hr:</span> <span id="tf1h_${id}"></span></div>
      <div><span>3 Hrs:</span> <span id="tf3h_${id}"></span></div>
      <div><span>6 Hrs:</span> <span id="tf6h_${id}"></span></div>
    </div>
  `;
  document.getElementById("provider_"+provider).appendChild(container);
}

/* INITIALIZE ALL GAMES */
providers.jili.forEach((game,i)=>createGame(game,"jili"+i,"jili"));
providers.pg.forEach((game,i)=>createGame(game,"pg"+i,"pg"));

/* FETCH METERS FROM SERVER */
async function updateMeters(){
  try{
    const res = await fetch("/.netlify/functions/meters");
    const data = await res.json();

    updateBar("jili0", data.boxingKing, data.timeframes.boxingKing);
    updateBar("jili1", data.goldenEmpire, data.timeframes.goldenEmpire);
  }catch(e){
    console.log("API error",e);
  }
}

/* UPDATE BAR AND TIMEFRAMES */
function updateBar(id,value,tfs){
  const bar=document.getElementById("bar_"+id);
  const text=document.getElementById("text_"+id);
  const label=document.getElementById("label_"+id);

  bar.style.width=value+"%";
  text.textContent=value+"%";
  label.textContent="Jackpot Meter: "+value+"%";
  bar.style.background=value.increasing?"green":"red";

  if(tfs){
    ["10","1h","3h","6h"].forEach(tf=>{
      const el=document.getElementById("tf"+tf+"_"+id);
      el.textContent = tfs["tf"+tf].toFixed(2) + "%";
      el.className = tfs["tf"+tf]>=0?"green":"red";
    });
  }
}

setInterval(updateMeters,3000);
updateMeters();
showProvider("jili");
</script>

</body>
</html>
